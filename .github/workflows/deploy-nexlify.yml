name: Deploy to nexlify.live

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-nexlify
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deploy archive
        run: |
          tar -czf nexlify-deploy.tar.gz \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.git \
            --exclude=dev.db \
            --exclude=data \
            --exclude=.env \
            --exclude=nexlify-deploy.tar.gz \
            .

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload and deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          REMOTE_PATH="${{ secrets.VPS_REMOTE_PATH }}"
          if [ -z "$REMOTE_PATH" ]; then REMOTE_PATH="/var/www/nexlify"; fi
          scp -o BatchMode=yes nexlify-deploy.tar.gz "${VPS_USER}@${VPS_HOST}:/tmp/nexlify-deploy.tar.gz"
          ssh -o BatchMode=yes "${VPS_USER}@${VPS_HOST}" \
            "set -e; mkdir -p ${REMOTE_PATH}; tar -xzf /tmp/nexlify-deploy.tar.gz -C ${REMOTE_PATH}; chmod +x ${REMOTE_PATH}/deploy/*.sh; cd ${REMOTE_PATH}; bash deploy/remote-update.sh"

      - name: Health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o BatchMode=yes "${VPS_USER}@${VPS_HOST}" \
            "curl -sfI http://127.0.0.1:3001 | head -1; pm2 status nexlify"
