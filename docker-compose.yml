services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexlify
      POSTGRES_PASSWORD: nexlify
      POSTGRES_DB: nexlify
    ports:
      - "5432:5432"
    volumes:
      - nexlify_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - nexlify_redis:/data

volumes:
  nexlify_pg:
  nexlify_redis:
