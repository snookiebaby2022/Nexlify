# Optional: TLS on port 3000. Install with PANEL_3000_SSL=1 only after HTTP mode works.
# If you see "plain HTTP request was sent to HTTPS port", use HTTP config instead.

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      https;
}

# upstream — /etc/nginx/conf.d/nexlify-upstream.conf

server {
    listen 3000 ssl;
    listen [::]:3000 ssl;
    server_name nexlify.live;

    ssl_certificate     /etc/letsencrypt/live/nexlify.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexlify.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 100m;
    large_client_header_buffers 8 64k;
    client_header_buffer_size 32k;
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;

    location ~ ^/(player_api\.php|get\.php|live/|c/|stalker_portal/) {
        proxy_pass http://nexlify_panel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://nexlify_panel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location / {
        proxy_pass http://nexlify_panel;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
    }
}
