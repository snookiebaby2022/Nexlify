# RTMP ingest (OBS) + nginx HLS for browser playback
# OBS: rtmp://rtmp.nexlify.live/live  key: nexlify
# 1080p (native): /hls/nexlify.m3u8
# 720p (ffmpeg):  /hls/nexlify-720.m3u8

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            allow publish all;
            allow play 127.0.0.1;
            deny play all;

            hls on;
            hls_path /var/www/nexlify-hls;
            wait_key on;
            hls_fragment 2s;
            hls_playlist_length 30s;
            hls_nested off;
            hls_sync 200ms;

            exec_publish /opt/nexlify-rtmp/hls-720-publish.sh $name;
            exec_publish_done /bin/bash -c 'pkill -f "nexlify-720.m3u8" 2>/dev/null || true';
        }
    }
}
