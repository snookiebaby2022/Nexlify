# Nexlify — reverse proxy for Next.js (port 3000)
# Install: sudo cp nginx/nexlify.conf /etc/nginx/sites-available/nexlify
#          sudo ln -s /etc/nginx/sites-available/nexlify /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream nexlify_app {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    server_name your-domain.example;

    # ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;

    client_max_body_size 100m;
    large_client_header_buffers 8 64k;
    client_header_buffer_size 32k;
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;

    # Xtream / panel paths (Next.js App Router)
    location ~ ^/(player_api\.php|get\.php|xmltv\.php|live/|movie/|c/|stalker_portal/) {
        proxy_pass http://nexlify_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://nexlify_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://nexlify_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
