# Shared upstreams — install once:
#   sudo cp nginx/nexlify-upstream.conf /etc/nginx/conf.d/nexlify-upstream.conf
# Panel listens on 127.0.0.1:13000 (not 3000 — that port must never appear in browser URLs).

upstream nexlify_panel {
    least_conn;
    server 127.0.0.1:13000;
    keepalive 32;
}

upstream nexlify_website {
    least_conn;
    server 127.0.0.1:13001;
    keepalive 32;
}
