# Nexlify recommended stream server — Nginx 1.29.0
# HTTP/2 + HTTP/3 + QUIC | Anti-Freeze live proxy | HLS edge
# Build: scripts/install-stream-stack.sh (bundled under /home/nexlify/bin)

# RTMP ingest (optional — for restream/publish)
# Requires nginx compiled with rtmp module or nginx-rtmp package
# include /etc/nginx/nexlify-rtmp.conf;

upstream nexlify_panel {
    server 127.0.0.1:13000;
    keepalive 32;
}

# Anti-Freeze: live locations MUST disable proxy buffering for IPTV zapping
map $uri $nexlify_live_proxy_buffering {
    default off;
    ~^/live/ off;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # HLS output directory (ffmpeg or nginx-rtmp)
    root /var/www/nexlify-hls;

    client_max_body_size 16m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Live playback proxy to panel or local ffmpeg
    location ~ ^/live/ {
        proxy_pass http://nexlify_panel;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # HLS segments — allow range requests
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    location /hls/ {
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        alias /var/www/nexlify-hls/;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

