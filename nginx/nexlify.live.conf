# nexlify.live (marketing / licenses) on 443 → nexlify_website (127.0.0.1:3001)
# Cert: sudo certbot certonly --nginx -d nexlify.live -d www.nexlify.live

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexlify.live www.nexlify.live;
    return 301 https://nexlify.live$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nexlify.live www.nexlify.live;

    ssl_certificate     /etc/letsencrypt/live/nexlify.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexlify.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;
    large_client_header_buffers 8 64k;
    client_header_buffer_size 32k;

    # Panel installer assets — disk only (avoid stale Next.js / Cloudflare cache)
    location /downloads/ {
        alias /var/www/nexlify/public/downloads/;
        add_header Cache-Control "no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        default_type application/octet-stream;
    }

    # Installer shell scripts only — do NOT use location /install/ (breaks the /install page)
    location = /install/panel.sh {
        alias /var/www/nexlify/public/install/panel.sh;
        add_header Cache-Control "no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        default_type text/x-shellscript;
    }

    location = /install/fix-ip-login.sh {
        alias /var/www/nexlify/public/install/fix-ip-login.sh;
        add_header Cache-Control "no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        default_type text/x-shellscript;
    }

    location = /install/fix-panel-license-sync.sh {
        alias /var/www/nexlify/public/install/fix-panel-license-sync.sh;
        add_header Cache-Control "no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        default_type text/x-shellscript;
    }

    location = /install/fix-panel-auto-update.sh {
        alias /var/www/nexlify/public/install/fix-panel-auto-update.sh;
        add_header Cache-Control "no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        default_type text/x-shellscript;
    }

    location = /install/panel-sync.env {
        alias /var/www/nexlify/public/install/panel-sync.env;
        add_header Cache-Control "no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        default_type text/plain;
    }

    location ^~ /install/scripts/ {
        alias /var/www/nexlify/public/install/scripts/;
        add_header Cache-Control "no-store, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        default_type text/x-shellscript;
    }

    # License server API (customer panels call https://nexlify.live/v1/activate)
    location /v1/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # HLS segments from nginx-rtmp (OBS → RTMP → /var/www/nexlify-hls)
    location /hls/ {
        alias /var/www/nexlify-hls/;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        expires -1;
        sendfile on;
        tcp_nopush on;
    }

    location / {
        proxy_pass http://nexlify_website;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
