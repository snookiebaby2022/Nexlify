# nexlify.live (marketing / licenses) on 443 → nexlify_website (127.0.0.1:3002)
# Cert: sudo certbot certonly --nginx -d nexlify.live -d www.nexlify.live

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexlify.live www.nexlify.live;
    return 301 https://nexlify.live$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nexlify.live www.nexlify.live;

    ssl_certificate     /etc/letsencrypt/live/nexlify.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexlify.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;
    large_client_header_buffers 8 64k;
    client_header_buffer_size 32k;

    location / {
        proxy_pass http://nexlify_website;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
