# /etc/nginx/conf.d/nexlify-stream-edge.conf
# Dedicated HTTP stream edge on :8080 → panel :3000 (Xtream / M3U / live / MAG portal)
# Requires: /etc/nginx/conf.d/nexlify-upstream.conf (upstream nexlify_panel)

server {
    listen 8080;
    listen [::]:8080;
    server_name panel.nexlify.live nexlify.live;

    client_max_body_size 50m;
    large_client_header_buffers 8 64k;

    location ~ ^/(player_api\.php|get\.php|live/|movie/|series/|c/|stalker_portal/) {
        proxy_pass http://nexlify_panel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        return 404;
    }
}
