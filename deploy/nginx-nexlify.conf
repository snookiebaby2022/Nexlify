# /etc/nginx/sites-available/nexlify.live
# Website :3001  |  Panel :3000  |  HTTP 80 + HTTPS 443
# Cloudflare: use SSL mode "Full (strict)" OR keep Flexible + config below

upstream nexlify_app {
    server 127.0.0.1:3001;
    keepalive 8;
}

upstream iptv_panel {
    server 127.0.0.1:3000;
    keepalive 8;
}

# Cloudflare sends X-Forwarded-Proto: https on port 80 (Flexible SSL).
# Do not redirect those requests or browsers loop forever.
map $http_x_forwarded_proto $redirect_to_https {
    default 1;
    https   0;
    http    1;
    ""      1;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexlify.live www.nexlify.live;

    location = /panel {
        return 301 /panel/;
    }

    location /panel/ {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://iptv_panel/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
    }

    location / {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://nexlify_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS — certbot adds / extends this block. After certbot, run:
#   bash /var/www/nexlify/deploy/fix-cloudflare.sh
# Or set Cloudflare SSL to "Full (strict)" (recommended).
