# Full site config — HTTP + HTTPS with proxy (fixes 502 on :443 after deploy)
# Requires: /etc/letsencrypt/live/nexlify.live/

upstream nexlify_app {
    server 127.0.0.1:3001;
    keepalive 8;
}

upstream iptv_panel {
    server 127.0.0.1:3000;
    keepalive 8;
}

map $http_x_forwarded_proto $redirect_to_https {
    default 1;
    https   0;
    http    1;
    ""      1;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexlify.live www.nexlify.live;

    location = /panel {
        return 301 /panel/;
    }

    location /panel/ {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://iptv_panel/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location / {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://nexlify_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexlify.live www.nexlify.live;

    ssl_certificate /etc/letsencrypt/live/nexlify.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexlify.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /var/www/nexlify/deploy/nginx-security-headers.conf;

    location = /panel {
        return 301 /panel/;
    }

    location /panel/ {
        proxy_pass http://iptv_panel/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location / {
        proxy_pass http://nexlify_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}
