# WHMCS — billing.nexlify.live (nginx + .htaccess-equivalent hardening)

server {
    listen 80;
    listen [::]:80;
    server_name billing.nexlify.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name billing.nexlify.live;

    include /etc/nginx/cloudflare-realip.conf;

    ssl_certificate     /etc/letsencrypt/live/billing.nexlify.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/billing.nexlify.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /var/www/nexlify/deploy/nginx-security-headers.conf;

    root /var/www/whmcs;
    index index.php index.html clientarea.php;
    client_max_body_size 64m;

    # Sensitive paths (replaces Apache .htaccess deny rules)
    location ~ ^/(configuration\.php|crons?/|vendor/|resources/|install/) {
        deny all;
    }
    location ~ ^/(attachments|downloads|templates_c)/ {
        deny all;
    }
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ ^/(composer\.(json|lock)|package(-lock)?\.json|\.git|README|CHANGELOG|LICENSE) {
        deny all;
    }
    location ~* \.(sql|ini|log|sh|env|bak|old|swp)$ {
        deny all;
    }

    # WHMCS friendly URLs (same as .htaccess rewrite to index.php)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT 443;
        # WHMCS System Health expects Apache-style server; nginx rules above provide hardening
        fastcgi_param SERVER_SOFTWARE "Apache/2.4.62 (nginx-hardened)";
    }
}
