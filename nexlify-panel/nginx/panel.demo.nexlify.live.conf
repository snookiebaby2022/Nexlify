# panel.demo.nexlify.live → canonical panel (nginx layer; middleware also redirects)
# Cert (optional, for HTTPS before redirect): sudo certbot certonly --nginx -d panel.demo.nexlify.live

server {
    listen 80;
    listen [::]:80;
    server_name panel.demo.nexlify.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.demo.nexlify.live;

    ssl_certificate     /etc/letsencrypt/live/panel.demo.nexlify.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.demo.nexlify.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://panel.nexlify.live/login$is_args$args;
}
